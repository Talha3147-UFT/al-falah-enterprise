    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8"><h1 class="text-3xl font-bold">Daily Purchase</h1><div class="flex gap-2"><button onclick="printPurchases()" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Print</button><button onclick="exportPurchasesCSV()" class="bg-green-600 text-white px-4 py-2 rounded-lg">CSV</button><button onclick="openAddModal()" class="bg-emerald-600 text-white px-5 py-2 rounded-lg">Add</button></div></div>
