<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Al-Falah Enterprise</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="shortcut icon" href="assets/logo.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <meta name="theme-color" content="#059669">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ============ LOGIN PAGE STYLES ============ */
        
        .login-bg {
            background: linear-gradient(-45deg, #064e3b, #047857, #059669, #10b981, #34d399);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 0%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }
        
        .particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .particle { position: absolute; background: rgba(255,255,255,0.1); border-radius: 50%; animation: floatParticle linear infinite; }
        .particle:nth-child(1) { width:80px;height:80px;left:10%;top:20%;animation-duration:8s; }
        .particle:nth-child(2) { width:60px;height:60px;left:70%;top:60%;animation-duration:10s;animation-delay:2s; }
        .particle:nth-child(3) { width:100px;height:100px;left:40%;top:80%;animation-duration:12s;animation-delay:4s; }
        .particle:nth-child(4) { width:50px;height:50px;left:80%;top:10%;animation-duration:7s;animation-delay:1s; }
        .particle:nth-child(5) { width:70px;height:70px;left:20%;top:50%;animation-duration:9s;animation-delay:3s; }
        .particle:nth-child(6) { width:90px;height:90px;left:60%;top:30%;animation-duration:11s;animation-delay:5s; }
        
        @keyframes floatParticle {
            0% { transform: translateY(0) translateX(0) rotate(0deg) scale(1); opacity:0.3; }
            25% { transform: translateY(-100px) translateX(50px) rotate(90deg) scale(1.2); opacity:0.5; }
            50% { transform: translateY(-50px) translateX(-30px) rotate(180deg) scale(0.8); opacity:0.2; }
            75% { transform: translateY(-150px) translateX(-80px) rotate(270deg) scale(1.1); opacity:0.4; }
            100% { transform: translateY(0) translateX(0) rotate(360deg) scale(1); opacity:0.3; }
        }
        
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.5);
            animation: fadeInUp 0.8s ease-out;
        }
        
        .logo-img { animation: float 3s ease-in-out infinite; }
        
        /* ============ INPUT WITH ICON - FIXED ============ */
        .input-icon-wrapper {
            position: relative;
        }
        
        .input-icon-wrapper .input-icon-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 16px;
            z-index: 10;
            pointer-events: none;
            transition: color 0.3s ease;
        }
        
        .input-icon-wrapper input {
            padding-left: 42px !important;
            padding-right: 42px !important;
        }
        
        .input-icon-wrapper input:focus ~ .input-icon-left,
        .input-icon-wrapper input:not(:placeholder-shown) ~ .input-icon-left {
            color: #059669;
        }
        
        .input-icon-wrapper .input-icon-right {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 16px;
            z-index: 10;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            transition: color 0.3s ease, transform 0.2s ease;
        }
        
        .input-icon-wrapper .input-icon-right:hover {
            color: #059669;
            transform: translateY(-50%) scale(1.15);
        }
        
        .login-btn {
            position: relative; overflow: hidden; transition: all 0.3s ease;
        }
        .login-btn::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%,-50%);
            transition: width 0.6s, height 0.6s;
        }
        .login-btn:hover::before { width: 400px; height: 400px; }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(5,150,105,0.4); }
        .login-btn:active { transform: translateY(-1px); }
        
        .login-btn.loading { pointer-events: none; opacity: 0.8; }
        .login-btn.loading .btn-text { opacity: 0; }
        .login-btn.loading .btn-spinner { display: block; }
        .btn-spinner { display: none; position: absolute; }
        
        .shake-error { animation: shake 0.6s ease-in-out; }
        
        .custom-checkbox {
            appearance: none; width: 18px; height: 18px;
            border: 2px solid #d1d5db; border-radius: 4px;
            cursor: pointer; position: relative; transition: all 0.2s ease;
        }
        .custom-checkbox:checked { background: #059669; border-color: #059669; }
        .custom-checkbox:checked::after {
            content: '✓'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%); color: white; font-size: 12px; font-weight: bold;
        }
        
        .security-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem; background: rgba(5,150,105,0.1);
            border: 1px solid rgba(5,150,105,0.2); border-radius: 9999px;
            font-size: 0.75rem; color: #047857; animation: fadeIn 1s ease-out;
        }
        .security-dot { width: 8px; height: 8px; background: #059669; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
        
        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.75rem;
            width: 100%; padding: 0.75rem; border: 2px solid #e5e7eb;
            border-radius: 0.75rem; background: white; cursor: pointer;
            font-weight: 500; color: #374151; transition: all 0.3s ease;
        }
        .google-btn:hover { border-color: #059669; background: #f0fdf4; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(5,150,105,0.15); }
        .google-btn img { width: 24px; height: 24px; }
        
        .divider {
            display: flex; align-items: center; gap: 1rem;
            color: #9ca3af; font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: #e5e7eb;
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">
    
    <!-- Animated Background -->
    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>

    <!-- Login Card -->
    <div class="w-full max-w-md relative z-10">
        <div class="login-card rounded-3xl shadow-2xl p-8">
            
            <!-- Logo -->
            <div class="text-center mb-6">
                <img src="assets/logo.png" alt="Al-Falah Enterprise" 
                     class="logo-img h-20 w-20 mx-auto object-contain rounded-2xl shadow-lg mb-3">
                <h1 class="text-2xl font-bold text-gray-800">Al-Falah Enterprise</h1>
                <p class="text-gray-500 text-sm">Business Management System</p>
                <div class="mt-3 flex justify-center">
                    <span class="security-badge">
                        <span class="security-dot"></span> Secure Login <i class="fas fa-shield-alt text-emerald-600"></i>
                    </span>
                </div>
            </div>

            <!-- Google Sign-In Button -->
            <button type="button" id="googleSignInBtn" class="google-btn mb-4">
                <img src="https://www.google.com/favicon.ico" alt="Google" onerror="this.style.display='none'">
                <span>Continue with Google</span>
            </button>

            <!-- Divider -->
            <div class="divider mb-4">
                <span>or sign in with email</span>
            </div>

            <!-- Email Login Form -->
            <form id="loginForm" class="space-y-4">
                
                <!-- Username/Email - FIXED ICON -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-user mr-1 text-emerald-600"></i>Username or Email
                    </label>
                    <div class="input-icon-wrapper">
                        <span class="input-icon-left">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="text" id="username" value=""
                               class="w-full py-3 border-2 border-gray-200 rounded-xl focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 transition-all bg-white text-base"
                               placeholder="Enter username or email" required autocomplete="username">
                    </div>
                </div>

                <!-- Password - FIXED ICON -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock mr-1 text-emerald-600"></i>Password
                    </label>
                    <div class="input-icon-wrapper">
                        <span class="input-icon-left">
                            <i class="fas fa-key"></i>
                        </span>
                        <input type="password" id="password" value=""
                               class="w-full py-3 border-2 border-gray-200 rounded-xl focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 transition-all bg-white text-base"
                               placeholder="Enter password" required autocomplete="current-password">
                        <button type="button" id="togglePassword" class="input-icon-right" tabindex="-1">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="rememberMe" checked class="custom-checkbox">
                        <span class="ml-2 text-gray-600">Remember me</span>
                    </label>
                    <a href="#" class="text-emerald-600 hover:text-emerald-700 font-medium">Forgot password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" id="loginBtn"
                        class="login-btn w-full bg-gradient-to-r from-emerald-600 to-green-600 text-white py-3.5 rounded-xl font-bold text-lg focus:outline-none focus:ring-4 focus:ring-emerald-300 shadow-lg">
                    <span class="btn-text flex items-center justify-center">
                        <i class="fas fa-sign-in-alt mr-2"></i>Sign In with Email
                    </span>
                    <span class="btn-spinner"><i class="fas fa-spinner fa-spin text-xl"></i></span>
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-5 text-center">
                <a href="index.html" class="text-sm text-gray-500 hover:text-emerald-600 transition-colors">
                    <i class="fas fa-arrow-left mr-1"></i>Back to Home
                </a>
            </div>
            <div class="mt-4 pt-4 border-t border-gray-100 text-center">
                <p class="text-xs text-gray-400">&copy; 2024 Al-Falah Enterprise</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/session-guard.js"></script>
    <script type="module" src="js/user-app.js"></script>
    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

        // ============ GOOGLE SIGN-IN ============
        document.getElementById('googleSignInBtn')?.addEventListener('click', async function() {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            
            Swal.fire({
                title: 'Google Sign-In',
                html: '<p class="text-sm">Opening Google login...</p>',
                allowOutsideClick: false,
                showConfirmButton: false,
                didOpen: () => Swal.showLoading()
            });
            
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        username: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        role: 'user',
                        authProvider: 'google',
                        photoURL: user.photoURL,
                        lastLogin: new Date().toISOString(),
                        createdAt: new Date().toISOString()
                    });
                } else {
                    await setDoc(userRef, {
                        lastLogin: new Date().toISOString(),
                        loginCount: (userSnap.data().loginCount || 0) + 1,
                        photoURL: user.photoURL
                    }, { merge: true });
                }
                
                localStorage.setItem('alfalah_user', JSON.stringify({
                    uid: user.uid, email: user.email,
                    username: user.displayName || user.email.split('@')[0],
                    role: 'user', photoURL: user.photoURL,
                    loginTime: Date.now(), provider: 'google'
                }));
                
                await Swal.fire({ icon: 'success', title: '✅ Welcome!', text: 'Signed in with Google!', timer: 1500, showConfirmButton: false });
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                if (error.code === 'auth/popup-closed-by-user' || error.code === 'auth/cancelled-popup-request') {
                    Swal.close();
                } else {
                    Swal.fire({ icon: 'error', title: 'Google Sign-In Failed', text: error.message, confirmButtonColor: '#059669' });
                }
            }
        });

        // ============ TOGGLE PASSWORD - FIXED ============
        document.getElementById('togglePassword')?.addEventListener('click', function(e) {
            e.preventDefault();
            const inp = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                inp.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // ============ EMAIL LOGIN ============
        document.getElementById('loginForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe')?.checked;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.classList.add('loading');
            
            Swal.fire({
                title: 'Signing in...',
                allowOutsideClick: false,
                showConfirmButton: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                let email = username;
                if (!username.includes('@')) {
                    if (username === 'Al-Falah Admin123') email = 'alfalahenterprise203@gmail.com';
                    else throw new Error('Invalid username');
                }
                
                const uc = await signInWithEmailAndPassword(auth, email, password);
                const user = uc.user;
                
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        username: 'Al-Falah Admin123', email: email,
                        role: 'admin', authProvider: 'email',
                        lastLogin: new Date().toISOString(), createdAt: new Date().toISOString()
                    });
                } else {
                    await setDoc(userRef, {
                        lastLogin: new Date().toISOString(),
                        loginCount: (userSnap.data().loginCount || 0) + 1
                    }, { merge: true });
                }
                
                const userData = {
                    uid: user.uid, email: user.email,
                    username: 'Al-Falah Admin123', role: 'admin',
                    loginTime: Date.now(), provider: 'email'
                };
                
                if (rememberMe) localStorage.setItem('alfalah_user', JSON.stringify(userData));
                else sessionStorage.setItem('alfalah_user', JSON.stringify(userData));
                
                loginBtn.classList.remove('loading');
                
                await Swal.fire({ icon: 'success', title: '✅ Welcome!', text: 'Login successful!', timer: 1500, showConfirmButton: false });
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                loginBtn.classList.remove('loading');
                document.querySelector('.login-card').classList.add('shake-error');
                setTimeout(() => document.querySelector('.login-card').classList.remove('shake-error'), 600);
                
                let msg = 'Login failed!';
                if (error.code === 'auth/user-not-found') msg = 'User not found!';
                else if (error.code === 'auth/wrong-password') msg = 'Invalid password!';
                else if (error.code === 'auth/invalid-credential') msg = 'Invalid credentials!';
                else msg = error.message;
                
                Swal.fire({ icon: 'error', title: 'Login Failed', text: msg, confirmButtonColor: '#059669' });
            }
        });

        console.log('🔒 Login Ready - Icons Fixed');
    </script>
</body>
</html>
