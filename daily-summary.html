    <div class="max-w-7xl mx-auto px-4 py-8"><div class="flex justify-between mb-8"><h1 class="text-3xl font-bold">📋 Daily Summary</h1><input type="date" id="summaryDate" class="px-4 py-2 border rounded-lg" onchange="loadSummary()"></div>
        <div class="grid grid-cols-4 gap-4 mb-8"><div class="bg-blue-50 p-4 rounded-xl"><p>Sales</p><h3 id="salesCount">0</h3></div><div class="bg-orange-50 p-4 rounded-xl"><p>Purchases</p><h3 id="purchaseCount">0</h3></div><div class="bg-red-50 p-4 rounded-xl"><p>Expenses</p><h3 id="expenseCount">0</h3></div><div class="bg-purple-50 p-4 rounded-xl"><p>P&L</p><h3 id="plCount">0</h3></div></div>
        <div class="grid grid-cols-2 gap-6"><div class="bg-white rounded-xl shadow-md p-6"><h3 class="font-bold mb-4">💰 Sales</h3><div class="space-y-2"><div class="flex justify-between"><span>Revenue</span><span class="text-green-600" id="sumRevenue">৳0</span></div><div class="flex justify-between"><span>Cost</span><span class="text-orange-600" id="sumCost">৳0</span></div><div class="flex justify-between"><span>Profit</span><span class="text-green-600" id="sumProfit">৳0</span></div><div class="flex justify-between"><span>Loss</span><span class="text-red-600" id="sumLoss">৳0</span></div></div></div><div class="bg-white rounded-xl shadow-md p-6"><h3 class="font-bold mb-4">📦 Stock</h3><div class="space-y-2"><div class="flex justify-between"><span>Purchased</span><span id="sumPurchased">0</span></div><div class="flex justify-between"><span>Sold</span><span id="sumSold">0</span></div><div class="flex justify-between"><span>Remaining</span><span id="sumRemaining">0</span></div></div></div></div>
    </div>
    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/session-guard.js"></script>
    <script type="module" src="js/user-app.js"></script>
    <script type="module">
        import { auth, db } from './js/firebase-config.js';import { collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        function FC(a){return'৳'+parseFloat(a||0).toLocaleString('en-BD',{minimumFractionDigits:2})}function TD(){return new Date().toISOString().split('T')[0]}function UID(){const s=localStorage.getItem('alfalah_user');if(s){try{return JSON.parse(s).uid}catch(e){}}return auth.currentUser?.uid}
        document.getElementById('summaryDate').value=TD();
        window.loadSummary=async function(){const uid=UID();if(!uid)return;const date=document.getElementById('summaryDate').value;const[sS,pS,eS,plS]=await Promise.all([getDocs(query(collection(db,'sales'),where('userId','==',uid))),getDocs(query(collection(db,'purchases'),where('userId','==',uid))),getDocs(query(collection(db,'expenses'),where('userId','==',uid))),getDocs(query(collection(db,'profitLossEntries'),where('userId','==',uid)))]);const sales=sS.docs.filter(d=>d.data().date===date);const purchases=pS.docs.filter(d=>d.data().date===date);const expenses=eS.docs.filter(d=>d.data().date===date);const pls=plS.docs.filter(d=>d.data().date===date);document.getElementById('salesCount').textContent=sales.length;document.getElementById('purchaseCount').textContent=purchases.length;document.getElementById('expenseCount').textContent=expenses.length;document.getElementById('plCount').textContent=pls.length;const rev=sales.reduce((s,d)=>s+(d.data().totalRevenue||d.data().sellingPrice||0),0);const cost=sales.reduce((s,d)=>s+(d.data().totalCost||((d.data().purchasePricePerUnit||0)*(d.data().quantitySold||0))),0);const pf=sales.filter(d=>(d.data().profitLoss||0)>0).reduce((s,d)=>s+(d.data().profitLoss||0),0);const ls=sales.filter(d=>(d.data().profitLoss||0)<0).reduce((s,d)=>s+Math.abs(d.data().profitLoss||0),0);document.getElementById('sumRevenue').textContent=FC(rev);document.getElementById('sumCost').textContent=FC(cost);document.getElementById('sumProfit').textContent=FC(pf);document.getElementById('sumLoss').textContent=FC(ls);document.getElementById('sumPurchased').textContent=purchases.reduce((s,d)=>s+(d.data().quantity||0),0);document.getElementById('sumSold').textContent=sales.reduce((s,d)=>s+(d.data().quantitySold||0),0);document.getElementById('sumRemaining').textContent=purchases.reduce((s,d)=>s+(d.data().stockRemaining||0),0)};loadSummary();
        document.getElementById('menuBtn').addEventListener('click',function(){var m=document.getElementById('dropdownMenu');var i=document.getElementById('menuIcon');m.classList.toggle('hidden');i.className=m.classList.contains('hidden')?'fas fa-bars text-2xl':'fas fa-times text-2xl'});var cp=window.location.pathname.split('/').pop();document.querySelectorAll('.menu-item').forEach(function(item){if(item.getAttribute('href')===cp){item.classList.remove('text-gray-600');item.classList.add('text-emerald-600','font-semibold','bg-emerald-50')}});
    </script>
