    <div id="dropdownMenu" class="hidden pb-4 border-t mt-2 animate-fadeIn">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-1 pt-2">

            <a href="sales.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-chart-line w-5"></i>Sales</a>
            <a href="expenses.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-money-bill-wave w-5"></i>Expenses</a>
            <a href="profit-loss.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-calculator w-5"></i>P&L</a>
            <a href="collections.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-layer-group w-5"></i>Collections</a>
            <a href="balance.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-balance-scale w-5"></i>Balance</a>
            <a href="due-tracker.html" class="menu-item px-4 py-3 rounded-lg text-emerald-600 bg-emerald-50 font-semibold flex items-center gap-2"><i class="fas fa-hand-holding-usd w-5"></i>Due</a>
            <a href="stock-summary.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-boxes w-5"></i>Stock</a>
            <a href="party-ledger.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-book w-5"></i>Ledger</a>
            <a href="reports.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-file-alt w-5"></i>Reports</a>
            <a href="daily-summary.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-clipboard-list w-5"></i>Summary</a>
            <a href="invoice-generator.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-file-invoice w-5"></i>Invoice</a>
            <a href="data-backup.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-database w-5"></i>Backup</a>
            <a href="settings.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-cog w-5"></i>Settings</a>
            <a href="account.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-user-circle w-5"></i>Account</a>
        </div>
    </div></div></nav>
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8"><h1 class="text-3xl font-bold">💰 Due Management</h1><div class="flex gap-2"><button onclick="openAddDueModal()" class="bg-red-600 text-white px-5 py-2.5 rounded-lg">Add Due</button><button onclick="openReceivePaymentModal()" class="bg-green-600 text-white px-5 py-2.5 rounded-lg">Receive Payment</button></div></div>
        <div class="grid grid-cols-4 gap-6 mb-8">
            <div class="bg-red-50 rounded-xl shadow-md p-6"><p>Total Due</p><h3 class="text-3xl font-bold text-red-700" id="totalDue">৳0</h3></div>
            <div class="bg-green-50 rounded-xl shadow-md p-6"><p>Received</p><h3 class="text-3xl font-bold text-green-700" id="totalReceived">৳0</h3></div>
            <div class="bg-blue-50 rounded-xl shadow-md p-6"><p>Outstanding</p><h3 class="text-3xl font-bold text-blue-700" id="outstanding">৳0</h3></div>
            <div class="bg-yellow-50 rounded-xl shadow-md p-6"><p>Entries</p><h3 class="text-3xl font-bold text-yellow-700" id="dueEntries">0</h3></div>
        </div>
        <div class="bg-white rounded-xl shadow-md overflow-hidden"><table class="w-full"><thead class="bg-red-600 text-white"><tr><th class="p-3">Date</th><th class="p-3">Party</th><th class="p-3">Desc</th><th class="p-3">Due</th><th class="p-3">Paid</th><th class="p-3">Balance</th><th class="p-3">Status</th><th class="p-3 no-print">Action</th></tr></thead><tbody id="dueTableBody"><tr><td colspan="8" class="text-center py-8 text-gray-500">Loading...</td></tr></tbody></table></div>
    </div>
    <div id="addDueModal" class="modal"><div class="modal-content"><h2 class="text-2xl font-bold mb-6">Add Due</h2><form id="addDueForm" class="space-y-4"><input type="text" id="duePartyName" class="w-full px-4 py-2 border rounded-lg" placeholder="Party Name" required><input type="text" id="dueDescription" class="w-full px-4 py-2 border rounded-lg" placeholder="Description"><input type="number" id="dueAmount" class="w-full px-4 py-2 border rounded-lg" placeholder="Amount" required><input type="date" id="dueDate" class="w-full px-4 py-2 border rounded-lg"><button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold">Save</button></form></div></div>
    <div id="receivePaymentModal" class="modal"><div class="modal-content"><h2 class="text-2xl font-bold mb-6">Receive Payment</h2><form id="receivePaymentForm" class="space-y-4"><select id="paymentDueSelect" class="w-full px-4 py-2 border rounded-lg" required><option value="">Choose...</option></select><input type="number" id="paymentAmount" class="w-full px-4 py-2 border rounded-lg" placeholder="Amount" required><input type="date" id="paymentDate" class="w-full px-4 py-2 border rounded-lg"><button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">Record</button></form></div></div>
    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/session-guard.js"></script>
    <script type="module" src="js/user-app.js"></script>
    <script type="module">
        import { auth, db } from './js/firebase-config.js';import { collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, where } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        function FC(a){return'৳'+parseFloat(a||0).toLocaleString('en-BD',{minimumFractionDigits:2})}function TD(){return new Date().toISOString().split('T')[0]}function UID(){const s=localStorage.getItem('alfalah_user');if(s){try{return JSON.parse(s).uid}catch(e){}}return auth.currentUser?.uid}
        async function loadDues(){const uid=UID();if(!uid)return;const snap=await getDocs(query(collection(db,'dues'),where('userId','==',uid)));const tb=document.getElementById('dueTableBody');tb.innerHTML='';let td=0,tr=0,to=0;const dues=[];snap.forEach(d=>{const dt=d.data();dues.push({id:d.id,...dt})});dues.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));if(dues.length===0){tb.innerHTML='<tr><td colspan="8" class="text-center py-8">No entries</td></tr>'}else{dues.forEach(d=>{const bal=(d.dueAmount||0)-(d.paidAmount||0);td+=d.dueAmount||0;tr+=d.paidAmount||0;if(bal>0)to+=bal;let s='';if(bal<=0)s='✅ Paid';else if(d.paidAmount>0)s='⚠️ Partial';else s='❌ Pending';tb.innerHTML+='<tr class="border-b"><td class="p-3">'+(d.dueDate||'-')+'</td><td class="p-3">'+d.partyName+'</td><td class="p-3">'+(d.description||'-')+'</td><td class="p-3 text-red-600">'+FC(d.dueAmount)+'</td><td class="p-3 text-green-600">'+FC(d.paidAmount)+'</td><td class="p-3 font-bold">'+FC(bal)+'</td><td class="p-3">'+s+'</td><td class="p-3 no-print">'+(bal>0?'<button onclick="quickPay(\''+d.id+'\','+bal+')" class="text-green-600 mr-2"><i class="fas fa-money-bill"></i></button>':'')+'<button onclick="deleteDue(\''+d.id+'\')" class="text-red-600"><i class="fas fa-trash"></i></button></td></tr>'})}document.getElementById('totalDue').textContent=FC(td);document.getElementById('totalReceived').textContent=FC(tr);document.getElementById('outstanding').textContent=FC(to);document.getElementById('dueEntries').textContent=dues.length;updatePaymentSelect(dues.filter(d=>(d.dueAmount||0)-(d.paidAmount||0)>0))}
        function updatePaymentSelect(pending){const sel=document.getElementById('paymentDueSelect');sel.innerHTML='<option value="">Choose...</option>';pending.forEach(d=>{const bal=(d.dueAmount||0)-(d.paidAmount||0);const o=document.createElement('option');o.value=d.id;o.textContent=d.partyName+' - Bal: '+FC(bal);o.dataset.balance=bal;sel.appendChild(o)})}
        document.getElementById('addDueForm')?.addEventListener('submit',async function(e){e.preventDefault();const uid=UID();await addDoc(collection(db,'dues'),{partyName:document.getElementById('duePartyName').value,description:document.getElementById('dueDescription').value,dueAmount:parseFloat(document.getElementById('dueAmount').value)||0,dueDate:document.getElementById('dueDate').value||TD(),paidAmount:0,status:'pending',userId:uid,createdAt:new Date().toISOString()});Swal.fire({icon:'success',title:'Added!',timer:1500});document.getElementById('addDueForm').reset();document.getElementById('addDueModal').classList.remove('active');loadDues()});
        document.getElementById('receivePaymentForm')?.addEventListener('submit',async function(e){e.preventDefault();const sel=document.getElementById('paymentDueSelect');const bal=parseFloat(sel.options[sel.selectedIndex].dataset.balance);const amt=parseFloat(document.getElementById('paymentAmount').value)||0;if(amt>bal){Swal.fire({icon:'error',title:'Error',text:'Amount exceeds balance!'});return}const ref=doc(db,'dues',sel.value);const snap=await getDoc(ref);const data=snap.data();const np=(data.paidAmount||0)+amt;await updateDoc(ref,{paidAmount:np,status:np>=(data.dueAmount||0)?'paid':'partial',lastPaymentDate:document.getElementById('paymentDate').value||TD()});Swal.fire({icon:'success',title:'Paid!',timer:1500});document.getElementById('receivePaymentForm').reset();document.getElementById('receivePaymentModal').classList.remove('active');loadDues()});
        window.quickPay=async function(id,bal){const{value:amt}=await Swal.fire({title:'Quick Pay',text:'Balance: '+FC(bal),input:'number',inputValue:bal,showCancelButton:true,confirmButtonColor:'#059669'});if(amt&&parseFloat(amt)>0&&parseFloat(amt)<=bal){const ref=doc(db,'dues',id);const snap=await getDoc(ref);const data=snap.data();const np=(data.paidAmount||0)+parseFloat(amt);await updateDoc(ref,{paidAmount:np,status:np>=(data.dueAmount||0)?'paid':'partial'});loadDues()}};
        window.deleteDue=async function(id){if((await Swal.fire({title:'Delete?',icon:'warning',showCancelButton:true,confirmButtonColor:'#d33'})).isConfirmed){await deleteDoc(doc(db,'dues',id));loadDues()}};
        window.openAddDueModal=function(){document.getElementById('dueDate').value=TD();document.getElementById('addDueModal').classList.add('active')};
        window.openReceivePaymentModal=function(){document.getElementById('paymentDate').value=TD();document.getElementById('receivePaymentModal').classList.add('active');loadDues()};
        loadDues();document.getElementById('menuBtn').addEventListener('click',function(){var m=document.getElementById('dropdownMenu');var i=document.getElementById('menuIcon');m.classList.toggle('hidden');i.className=m.classList.contains('hidden')?'fas fa-bars text-2xl':'fas fa-times text-2xl'});var cp=window.location.pathname.split('/').pop();document.querySelectorAll('.menu-item').forEach(function(item){if(item.getAttribute('href')===cp){item.classList.remove('text-gray-600');item.classList.add('text-emerald-600','font-semibold','bg-emerald-50')}});
    </script>
</body>
