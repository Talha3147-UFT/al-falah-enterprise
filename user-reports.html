<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Reports - Al-Falah Enterprise</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="shortcut icon" href="assets/logo.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <meta name="theme-color" content="#059669">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">
    
    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <img src="assets/logo.png" class="h-10 w-10 object-contain rounded-lg">
                    <span class="text-lg font-bold text-gray-800">Al-Falah Enterprise</span>
                </div>
                <button id="menuBtn" class="text-gray-600 hover:text-emerald-600 p-2 focus:outline-none">
                    <i class="fas fa-bars text-2xl" id="menuIcon"></i>
                </button>
            </div>
            <div id="dropdownMenu" class="hidden pb-4 border-t mt-2 animate-fadeIn">
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-1 pt-2">
                    <a href="user-dashboard.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-tachometer-alt w-5"></i>Dashboard</a>
                    <a href="purchases.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-shopping-cart w-5"></i>Purchases</a>
                    <a href="sales.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-chart-line w-5"></i>Sales</a>
                    <a href="expenses.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-money-bill-wave w-5"></i>Expenses</a>
                    <a href="profit-loss.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-calculator w-5"></i>P&L</a>
                    <a href="user-reports.html" class="menu-item px-4 py-3 rounded-lg text-emerald-600 bg-emerald-50 font-semibold flex items-center gap-2"><i class="fas fa-paper-plane w-5"></i>Reports</a>
                    <a href="account.html" class="menu-item px-4 py-3 rounded-lg text-gray-600 hover:text-emerald-600 hover:bg-emerald-50 flex items-center gap-2"><i class="fas fa-user-circle w-5"></i>Account</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">📊 User Reports</h1>
        <p class="text-gray-500 mb-8">Submit reports to Main Admin for review</p>

        <!-- Submit Report Form -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fas fa-paper-plane text-purple-600 mr-2"></i>Submit New Report</h2>
            <form id="reportForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Report Title *</label>
                        <input type="text" id="reportTitle" class="w-full px-4 py-2.5 border rounded-lg" placeholder="Enter report title" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Report Type *</label>
                        <select id="reportType" class="w-full px-4 py-2.5 border rounded-lg" required>
                            <option value="">Select type...</option>
                            <option value="daily">📋 Daily Report</option>
                            <option value="weekly">📅 Weekly Report</option>
                            <option value="monthly">📊 Monthly Report</option>
                            <option value="sales">💰 Sales Report</option>
                            <option value="expense">💸 Expense Report</option>
                            <option value="stock">📦 Stock Report</option>
                            <option value="other">📝 Other</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Report Content *</label>
                    <textarea id="reportContent" class="w-full px-4 py-2.5 border rounded-lg" rows="5" placeholder="Write your detailed report here..." required></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Report Date</label>
                        <input type="date" id="reportDate" class="w-full px-4 py-2.5 border rounded-lg">
                    </div>
                    <div class="flex items-end">
                        <button type="submit" class="w-full bg-purple-600 text-white py-2.5 rounded-lg font-bold hover:bg-purple-700 transition-all">
                            <i class="fas fa-paper-plane mr-2"></i>Submit Report
                        </button>
                    </div>
                </div>
            </form>
            <div id="reportMsg" class="mt-4 p-4 rounded-lg text-center hidden"></div>
        </div>

        <!-- My Submitted Reports -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="px-6 py-4 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-list mr-2 text-emerald-600"></i>My Submitted Reports</h2>
                <span class="text-sm text-gray-400" id="reportCount">0 reports</span>
            </div>
            <div class="table-container">
                <table class="w-full">
                    <thead>
                        <tr class="bg-purple-600 text-white">
                            <th class="p-3 text-left">Date</th>
                            <th class="p-3 text-left">Title</th>
                            <th class="p-3 text-left">Type</th>
                            <th class="p-3 text-left">Status</th>
                            <th class="p-3 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="myReportsBody">
                        <tr><td colspan="5" class="text-center py-8 text-gray-500">Loading reports...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/user-app.js"></script>
    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { signOut } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { collection, addDoc, getDocs, deleteDoc, doc, query, where, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

        function TD() { return new Date().toISOString().split('T')[0]; }
        
        function getUserId() {
            const s = localStorage.getItem('alfalah_user') || sessionStorage.getItem('alfalah_user');
            if (s) { try { return JSON.parse(s).uid; } catch (e) {} }
            return auth.currentUser?.uid;
        }
        
        function getUserName() {
            const s = localStorage.getItem('alfalah_user') || sessionStorage.getItem('alfalah_user');
            if (s) { try { return JSON.parse(s).username; } catch (e) {} }
            return 'User';
        }
        
        function getUserEmail() {
            const s = localStorage.getItem('alfalah_user') || sessionStorage.getItem('alfalah_user');
            if (s) { try { return JSON.parse(s).email; } catch (e) {} }
            return auth.currentUser?.email || '';
        }

        const uid = getUserId();
        if (!uid) { window.location.href = 'login.html'; }

        document.getElementById('reportDate').value = TD();

        // ============ SUBMIT REPORT ============
        document.getElementById('reportForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const msg = document.getElementById('reportMsg');
            msg.classList.remove('hidden');
            msg.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Submitting report...';
            msg.className = 'mt-4 p-4 rounded-lg text-center bg-blue-50 text-blue-700';
            
            try {
                await addDoc(collection(db, 'user_reports'), {
                    title: document.getElementById('reportTitle').value.trim(),
                    type: document.getElementById('reportType').value,
                    content: document.getElementById('reportContent').value.trim(),
                    date: document.getElementById('reportDate').value || TD(),
                    submittedBy: getUserName(),
                    submittedByEmail: getUserEmail(),
                    userId: uid,
                    status: 'pending',
                    createdAt: new Date().toISOString(),
                    reviewedBy: '',
                    reviewedAt: ''
                });
                
                msg.innerHTML = '<i class="fas fa-check-circle mr-2"></i>✅ Report submitted successfully! Main Admin will review it.';
                msg.className = 'mt-4 p-4 rounded-lg text-center bg-green-50 text-green-700';
                document.getElementById('reportForm').reset();
                document.getElementById('reportDate').value = TD();
                loadMyReports();
                
                Swal.fire({ icon: 'success', title: 'Submitted!', text: 'Your report has been sent to Main Admin for review.', confirmButtonColor: '#059669' });
            } catch(err) {
                msg.innerHTML = '<i class="fas fa-times-circle mr-2"></i>❌ Error: ' + err.message;
                msg.className = 'mt-4 p-4 rounded-lg text-center bg-red-50 text-red-700';
            }
        });

        // ============ LOAD MY REPORTS ============
        async function loadMyReports() {
            const tbody = document.getElementById('myReportsBody');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8">Loading...</td></tr>';
            
            try {
                const q = query(collection(db, 'user_reports'), where('userId', '==', uid), orderBy('createdAt', 'desc'), limit(50));
                const snap = await getDocs(q);
                tbody.innerHTML = '';
                
                document.getElementById('reportCount').textContent = snap.size + ' reports';
                
                if (snap.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-500">No reports submitted yet</td></tr>';
                    return;
                }
                
                snap.forEach(d => {
                    const data = d.data();
                    let statusBadge = '';
                    if (data.status === 'reviewed') {
                        statusBadge = '<span class="badge badge-success">✅ Reviewed</span>';
                    } else if (data.status === 'seen') {
                        statusBadge = '<span class="badge badge-info">👁️ Seen</span>';
                    } else {
                        statusBadge = '<span class="badge badge-warning">⏳ Pending</span>';
                    }
                    
                    const row = document.createElement('tr');
                    row.className = 'border-b hover:bg-gray-50';
                    row.innerHTML = `
                        <td class="p-3 text-sm">${data.date || '-'}</td>
                        <td class="p-3 font-medium">${data.title || '-'}</td>
                        <td class="p-3 text-sm">${data.type || '-'}</td>
                        <td class="p-3">${statusBadge}</td>
                        <td class="p-3 text-center">
                            <button onclick="viewReport('${d.id}')" class="text-blue-600 hover:text-blue-800 mr-2" title="View"><i class="fas fa-eye"></i></button>
                            <button onclick="deleteReport('${d.id}')" class="text-red-600 hover:text-red-800" title="Delete"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-500">Error loading reports</td></tr>';
            }
        }

        // ============ VIEW REPORT ============
        window.viewReport = async function(id) {
            const snap = await getDoc(doc(db, 'user_reports', id));
            if (snap.exists()) {
                const data = snap.data();
                Swal.fire({
                    title: data.title,
                    html: `
                        <div class="text-left space-y-2">
                            <p><strong>Type:</strong> ${data.type}</p>
                            <p><strong>Date:</strong> ${data.date}</p>
                            <p><strong>Status:</strong> ${data.status === 'reviewed' ? '✅ Reviewed' : data.status === 'seen' ? '👁️ Seen' : '⏳ Pending'}</p>
                            ${data.reviewedBy ? `<p><strong>Reviewed By:</strong> ${data.reviewedBy}</p>` : ''}
                            ${data.reviewedAt ? `<p><strong>Reviewed At:</strong> ${new Date(data.reviewedAt).toLocaleString()}</p>` : ''}
                            <hr class="my-2">
                            <p><strong>Content:</strong></p>
                            <div class="bg-gray-50 p-3 rounded-lg text-sm max-h-60 overflow-y-auto">${data.content.replace(/\n/g, '<br>')}</div>
                        </div>
                    `,
                    confirmButtonColor: '#059669',
                    width: '600px'
                });
            }
        };

        // ============ DELETE REPORT ============
        window.deleteReport = async function(id) {
            const result = await Swal.fire({
                title: 'Delete Report?',
                text: 'This cannot be undone!',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Delete'
            });
            if (result.isConfirmed) {
                await deleteDoc(doc(db, 'user_reports', id));
                Swal.fire({ icon: 'success', title: 'Deleted!', timer: 1500, showConfirmButton: false });
                loadMyReports();
            }
        };

        // ============ LOGOUT ============
        window.logout = async function() {
            const r = await Swal.fire({ title: 'Logout?', icon: 'question', showCancelButton: true, confirmButtonColor: '#059669', cancelButtonColor: '#d33', confirmButtonText: 'Yes' });
            if (r.isConfirmed) {
                localStorage.removeItem('alfalah_user');
                sessionStorage.removeItem('alfalah_user');
                await signOut(auth);
                window.location.href = 'login.html';
            }
        };

        // Mobile menu
        document.getElementById('menuBtn').addEventListener('click', function() {
            const m = document.getElementById('dropdownMenu');
            const i = document.getElementById('menuIcon');
            m.classList.toggle('hidden');
            i.className = m.classList.contains('hidden') ? 'fas fa-bars text-2xl' : 'fas fa-times text-2xl';
        });

        const cp = window.location.pathname.split('/').pop();
        document.querySelectorAll('.menu-item').forEach(item => {
            if (item.getAttribute('href') === cp) {
                item.classList.remove('text-gray-600');
                item.classList.add('text-emerald-600', 'font-semibold', 'bg-emerald-50');
            }
        });

        loadMyReports();
        console.log('✅ User Reports Ready');
    </script>
</body>
</html>
