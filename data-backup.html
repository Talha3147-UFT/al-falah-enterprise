    <div class="max-w-4xl mx-auto px-4 py-8"><h1 class="text-3xl font-bold mb-8">💾 Backup & Restore</h1>
        <div class="bg-white rounded-xl shadow-md p-8 mb-8"><h2 class="text-xl font-bold mb-4">Backup</h2><div class="grid grid-cols-4 gap-4"><button onclick="backup('purchases')" class="bg-blue-600 text-white py-3 rounded-lg">Purchases</button><button onclick="backup('sales')" class="bg-green-600 text-white py-3 rounded-lg">Sales</button><button onclick="backup('expenses')" class="bg-red-600 text-white py-3 rounded-lg">Expenses</button><button onclick="backupAll()" class="bg-purple-600 text-white py-3 rounded-lg">All</button></div></div>
        <div class="bg-white rounded-xl shadow-md p-8"><h2 class="text-xl font-bold mb-4">Restore</h2><div class="border-2 border-dashed rounded-xl p-8 text-center"><input type="file" id="restoreFile" accept=".json" class="hidden" onchange="restore()"><button onclick="document.getElementById('restoreFile').click()" class="bg-yellow-600 text-white px-6 py-3 rounded-lg"><i class="fas fa-upload mr-2"></i>Choose File</button></div></div>
    </div>
    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/session-guard.js"></script>
    <script type="module" src="js/user-app.js"></script>
    <script type="module">
        import { auth, db } from './js/firebase-config.js';import { collection, getDocs, addDoc, query, where } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        function UID(){const s=localStorage.getItem('alfalah_user');if(s){try{return JSON.parse(s).uid}catch(e){}}return auth.currentUser?.uid}
        window.backup=async function(col){const uid=UID();const snap=await getDocs(query(collection(db,col),where('userId','==',uid)));const data=[];snap.forEach(d=>{const{id,...rest}=d.data();data.push(rest)});const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=col+'_backup.json';a.click();Swal.fire({icon:'success',title:'Done!',timer:1500})};
        window.backupAll=async function(){for(const c of['purchases','sales','expenses','profitLossEntries']){await backup(c)}Swal.fire({icon:'success',title:'All backed up!'})};
        window.restore=async function(){const f=document.getElementById('restoreFile').files[0];if(!f)return;const uid=UID();const r=await Swal.fire({title:'Restore?',icon:'warning',showCancelButton:true,confirmButtonColor:'#f59e0b'});if(!r.isConfirmed)return;const reader=new FileReader();reader.onload=async function(e){const data=JSON.parse(e.target.result);for(const rec of data){rec.userId=uid;await addDoc(collection(db,'purchases'),rec)}Swal.fire({icon:'success',title:'Restored!'})};reader.readAsText(f)};
        document.getElementById('menuBtn').addEventListener('click',function(){var m=document.getElementById('dropdownMenu');var i=document.getElementById('menuIcon');m.classList.toggle('hidden');i.className=m.classList.contains('hidden')?'fas fa-bars text-2xl':'fas fa-times text-2xl'});var cp=window.location.pathname.split('/').pop();document.querySelectorAll('.menu-item').forEach(function(item){if(item.getAttribute('href')===cp){item.classList.remove('text-gray-600');item.classList.add('text-emerald-600','font-semibold','bg-emerald-50')}});
    </script>
