    <div class="max-w-7xl mx-auto px-4 py-8"><h1 class="text-3xl font-bold mb-8">📊 Transaction History</h1>
        <div class="bg-white rounded-xl shadow-md p-6 mb-8"><div class="grid grid-cols-3 gap-4"><div><select id="reportType" class="w-full px-4 py-2 border rounded-lg" onchange="loadReport()"><option value="all">All</option><option value="purchase">Purchases</option><option value="sale">Sales</option><option value="expense">Expenses</option></select></div><div><input type="date" id="rStartDate" class="w-full px-4 py-2 border rounded-lg" onchange="loadReport()"></div><div><input type="date" id="rEndDate" class="w-full px-4 py-2 border rounded-lg" onchange="loadReport()"></div></div></div>
        <div class="bg-white rounded-xl shadow-md overflow-hidden"><table class="w-full"><thead class="bg-purple-600 text-white"><tr><th class="p-3">Date</th><th class="p-3">Type</th><th class="p-3">Details</th><th class="p-3">Amount</th></tr></thead><tbody id="reportTableBody"><tr><td colspan="4" class="text-center py-8 text-gray-500">Select filters</td></tr></tbody></table></div>
    </div>
    <script type="module" src="js/firebase-config.js"></script>
    <script src="js/session-guard.js"></script>
    <script type="module" src="js/user-app.js"></script>
    <script type="module">
        import { auth, db } from './js/firebase-config.js';import { collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        function FC(a){return'৳'+parseFloat(a||0).toLocaleString('en-BD',{minimumFractionDigits:2})}function UID(){const s=localStorage.getItem('alfalah_user');if(s){try{return JSON.parse(s).uid}catch(e){}}return auth.currentUser?.uid}
        window.loadReport=async function(){const uid=UID();if(!uid)return;const type=document.getElementById('reportType').value;const sd=document.getElementById('rStartDate').value||'2000-01-01';const ed=document.getElementById('rEndDate').value||'2099-12-31';const tb=document.getElementById('reportTableBody');tb.innerHTML='<tr><td colspan="4" class="text-center py-8">Loading...</td></tr>';let txns=[];if(type==='all'||type==='purchase'){const snap=await getDocs(query(collection(db,'purchases'),where('userId','==',uid)));snap.forEach(d=>{const dt=d.data();if(dt.date>=sd&&dt.date<=ed)txns.push({date:dt.date,type:'🛒 Purchase',details:dt.productName+' x'+dt.quantity,amount:(dt.price||0)*(dt.quantity||0)})})}if(type==='all'||type==='sale'){const snap=await getDocs(query(collection(db,'sales'),where('userId','==',uid)));snap.forEach(d=>{const dt=d.data();if(dt.date>=sd&&dt.date<=ed)txns.push({date:dt.date,type:'💰 Sale',details:dt.productName+' x'+dt.quantitySold,amount:dt.totalRevenue||dt.sellingPrice||0})})}if(type==='all'||type==='expense'){const snap=await getDocs(query(collection(db,'expenses'),where('userId','==',uid)));snap.forEach(d=>{const dt=d.data();if(dt.date>=sd&&dt.date<=ed)txns.push({date:dt.date,type:'💸 Expense',details:dt.reason,amount:dt.cost||0})})}txns.sort((a,b)=>b.date.localeCompare(a.date));tb.innerHTML='';if(txns.length===0){tb.innerHTML='<tr><td colspan="4" class="text-center py-8">No data</td></tr>'}else txns.forEach(t=>{tb.innerHTML+='<tr class="border-b"><td class="p-3">'+t.date+'</td><td class="p-3">'+t.type+'</td><td class="p-3">'+t.details+'</td><td class="p-3 font-semibold">'+FC(t.amount)+'</td></tr>'})};
        document.getElementById('menuBtn').addEventListener('click',function(){var m=document.getElementById('dropdownMenu');var i=document.getElementById('menuIcon');m.classList.toggle('hidden');i.className=m.classList.contains('hidden')?'fas fa-bars text-2xl':'fas fa-times text-2xl'});var cp=window.location.pathname.split('/').pop();document.querySelectorAll('.menu-item').forEach(function(item){if(item.getAttribute('href')===cp){item.classList.remove('text-gray-600');item.classList.add('text-emerald-600','font-semibold','bg-emerald-50')}});
    </script>
