    <div class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">👤 Account Settings</h1>

        <!-- Profile Card -->
        <div class="bg-white rounded-xl shadow-md p-8 mb-8">
            <div class="flex items-center space-x-6">
                <div class="bg-emerald-100 rounded-full p-6"><i class="fas fa-user text-4xl text-emerald-600"></i></div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800" id="displayUsername">Al-Falah Admin123</h2>
                    <p class="text-gray-500" id="displayEmail">alfalahenterprise203@gmail.com</p>
                    <span class="inline-block px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-semibold mt-2">Administrator</span>
                </div>
            </div>
            <div class="border-t mt-6 pt-4">
                <p class="text-sm text-gray-500"><i class="fas fa-calendar-alt mr-2"></i>Member since: <span id="memberSince"></span></p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex space-x-4 mb-8">
            <button onclick="switchAccountTab('changePassword')" id="changePasswordTab" class="px-6 py-3 rounded-lg font-semibold bg-emerald-600 text-white transition-all">
                <i class="fas fa-key mr-2"></i>Change Password
            </button>
            <button onclick="switchAccountTab('updateProfile')" id="updateProfileTab" class="px-6 py-3 rounded-lg font-semibold bg-gray-200 text-gray-700 transition-all">
                <i class="fas fa-user-edit mr-2"></i>Update Profile
            </button>
        </div>

        <!-- Change Password -->
        <div id="changePasswordSection">
            <div class="bg-white rounded-xl shadow-md p-8">
                <h2 class="text-xl font-bold text-gray-800 mb-6">🔒 Change Password</h2>
                <form id="changePasswordForm" class="space-y-4 max-w-md">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Current Password</label>
                        <div class="relative">
                            <input type="password" id="currentPassword" class="w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Enter current password" required>
                            <button type="button" class="absolute right-3 top-3 text-gray-400" onclick="togglePasswordVisibility('currentPassword')"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                        <input type="password" id="newPassword" class="w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Min 6 characters" required minlength="6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Confirm New Password</label>
                        <input type="password" id="confirmPassword" class="w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Re-enter new password" required minlength="6">
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-semibold hover:bg-emerald-700 transition-all">
                        <i class="fas fa-save mr-2"></i>Update Password
                    </button>
                </form>
            </div>
        </div>

        <!-- Update Profile -->
        <div id="updateProfileSection" class="hidden">
            <div class="bg-white rounded-xl shadow-md p-8">
                <h2 class="text-xl font-bold text-gray-800 mb-6">✏️ Update Profile</h2>
                <form id="updateProfileForm" class="space-y-4 max-w-md">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                        <input type="text" id="updateUsername" class="w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-emerald-500" value="Al-Falah Admin123">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="updateEmail" class="w-full px-4 py-2.5 border rounded-lg focus:ring-2 focus:ring-emerald-500" value="alfalahenterprise203@gmail.com">
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-semibold hover:bg-emerald-700 transition-all">
                        <i class="fas fa-save mr-2"></i>Update Profile
                    </button>
                </form>
            </div>
        </div>

        <!-- Logout -->
        <div class="mt-8 text-center">
            <button onclick="logout()" class="px-8 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-all font-semibold">
                <i class="fas fa-sign-out-alt mr-2"></i>Logout
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        document.getElementById('menuBtn').addEventListener('click',function(){var m=document.getElementById('dropdownMenu');var i=document.getElementById('menuIcon');m.classList.toggle('hidden');i.className=m.classList.contains('hidden')?'fas fa-bars text-2xl':'fas fa-times text-2xl'});
        var cp=window.location.pathname.split('/').pop();document.querySelectorAll('.menu-item').forEach(function(item){if(item.getAttribute('href')===cp){item.classList.remove('text-gray-600');item.classList.add('text-emerald-600','font-semibold','bg-emerald-50')}});
    </script>
